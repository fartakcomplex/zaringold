# =============================================================================
# ZarinGold Helm Chart - values.yaml
# Comprehensive configuration for gold trading platform on Kubernetes
# =============================================================================

# -- Global configuration
global:
  imagePullSecrets: []
  # - name: ghcr-pull-secret
  imageRegistry: ""
  namespaceOverride: ""

# -- Container image configuration
image:
  repository: ghcr.io/fartakcomplex/zaringold
  tag: v3.0.0
  pullPolicy: IfNotPresent
  digest: ""

chatImage:
  repository: ghcr.io/fartakcomplex/zaringold-chat
  tag: v3.0.0
  pullPolicy: IfNotPresent

priceImage:
  repository: ghcr.io/fartakcomplex/zaringold-price
  tag: v3.0.0
  pullPolicy: IfNotPresent

# -- Application name override
nameOverride: ""
fullnameOverride: ""

# -- Number of replicas for Next.js app
replicaCount: 3

# -- Chat service replicas
chatReplicaCount: 2

# -- Price service replicas
priceReplicaCount: 2

# -- Namespace to deploy into
namespace: zaringold

# -- Service account configuration
serviceAccount:
  create: true
  annotations: {}
  name: "zaringold-app"
  automountServiceAccountToken: false

# -- Security context (Pod level)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

# -- Security context (Container level)
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Service configuration for Next.js app
service:
  type: ClusterIP
  port: 3000
  targetPort: 3000
  annotations: {}
  sessionAffinity: None

# -- Chat service configuration
chatService:
  type: ClusterIP
  port: 3005
  targetPort: 3005
  headless: true
  sessionAffinity: ClientIP
  sessionAffinityTimeout: 3600

# -- Next.js App deployment configuration
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

chatResources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

priceResources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "0.5"
    memory: 256Mi

# -- Autoscaling (HPA) configuration
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 50
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30

chatAutoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60

priceAutoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# -- Pod Disruption Budget
pdb:
  enabled: true
  nextjsMinAvailable: 1
  chatMinAvailable: 1
  priceMaxUnavailable: 1

# -- Topology spread constraints
topologySpreadConstraints:
  enabled: true
  maxSkew: 1
  topologyKey: topology.kubernetes.io/zone

# -- Node selector for pod scheduling
nodeSelector: {}
  # node-type: app
  # kubernetes.io/arch: amd64

# -- Tolerations for pod scheduling
tolerations: []
  # - key: "dedicated"
  #   operator: "Equal"
  #   value: "zaringold"
  #   effect: "NoSchedule"

# -- Affinity rules
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values:
                  - nextjs
          topologyKey: kubernetes.io/hostname
  nodeAffinity: {}

# -- Init containers (wait for dependencies)
initContainers:
  waitForPostgres:
    enabled: true
    image: busybox:1.36
    postgresHost: "zaringold-postgres-primary"
  waitForRedis:
    enabled: true
    image: busybox:1.36

# -- Liveness probe configuration
livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 20
  timeoutSeconds: 10
  failureThreshold: 3

# -- Readiness probe configuration
readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# -- Startup probe configuration
startupProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 30

# -- Ingress configuration
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-production
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/rate-limit: "true"
    # nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    # nginx.ingress.kubernetes.io/rate-limit-connections: "30"
    # nginx.ingress.kubernetes.io/affinity: "cookie"
    # nginx.ingress.kubernetes.io/session-cookie-name: "ZG_CHAT_SID"
    # nginx.ingress.kubernetes.io/websocket-services: "chat-service"
    # nginx.ingress.kubernetes.io/enable-cors: "true"

  hosts:
    - host: zaringold.ir
      paths:
        - path: /
          pathType: Prefix
          service: nextjs-app
          port: 3000
    - host: app.zaringold.ir
      paths:
        - path: /socket.io
          pathType: Prefix
          service: chat-service
          port: 3005
        - path: /
          pathType: Prefix
          service: nextjs-app
          port: 3000
    - host: api.zaringold.ir
      paths:
        - path: /
          pathType: Prefix
          service: nextjs-app
          port: 3000

  tls:
    - secretName: zaringold-tls
      hosts:
        - zaringold.ir
        - www.zaringold.ir
        - app.zaringold.ir
        - api.zaringold.ir

# -- Network policies
networkPolicy:
  enabled: true
  allowIngress: true
  allowEgress: true
  ingressNamespaces:
    - ingress-nginx
    - prometheus
  egressEndpoints:
    - port: 6379
      description: "Redis"
    - port: 5432
      description: "PostgreSQL"
    - port: 3005
      description: "Chat Service"
    - port: 3006
      description: "Price Service"

# -- Application configuration (ConfigMap)
config:
  nodeEnv: "production"
  nextTelemetryDisabled: "true"
  port: "3000"
  hostname: "0.0.0.0"
  databaseProvider: "postgresql"
  redisDb: "0"
  redisKeyPrefix: "zg:"
  priceUpdateInterval: "30000"
  enableChat: "true"
  enableRealtimePrices: "true"
  enableGoldCard: "true"
  enableMerchantGateway: "true"
  enableGamification: "true"
  enableInsurance: "true"
  enableTelegramBot: "true"
  enableAiChat: "true"
  enableMultilingual: "true"
  rateLimitWindowMs: "60000"
  rateLimitMaxRequests: "100"
  rateLimitMaxOtp: "5"
  sessionTtlHours: "72"
  logLevel: "info"
  logFormat: "json"
  corsAllowedOrigins: "https://zaringold.ir,https://www.zaringold.ir"

# -- Secrets
secrets:
  enabled: true
  # Use existing secret if available
  existingSecret: ""
  databaseUrl: ""
  redisPassword: ""
  redisUrl: ""
  jwtSecret: ""
  sessionSecret: ""
  otpEncryptionKey: ""
  zarinpalMerchantId: ""
  smsApiKey: ""
  smsSender: ""
  smtpHost: ""
  smtpPort: "587"
  smtpUser: ""
  smtpPassword: ""
  emailFrom: ""
  telegramBotToken: ""
  openaiApiKey: ""
  tgjuApiUrl: ""

# -- Redis configuration (sub-chart or external)
redis:
  enabled: true
  # For external Redis
  external:
    enabled: false
    host: ""
    port: 6379
    password: ""
  # Bitnami sub-chart values
  architecture: replication
  auth:
    enabled: true
    password: ""  # Generated if empty
  master:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
  replica:
    replicaCount: 2
    persistence:
      enabled: true
      size: 8Gi
  metrics:
    enabled: true

# -- PostgreSQL configuration
postgres:
  enabled: true
  # For external PostgreSQL
  external:
    enabled: false
    host: ""
    port: 5432
    database: ""
    username: ""
    password: ""
    secretName: ""
  # Bitnami sub-chart values
  architecture: replication
  auth:
    database: zaringold
    username: zaringold
    password: ""  # Generated if empty
    postgresPassword: ""  # Generated if empty
  primary:
    persistence:
      enabled: true
      size: 50Gi
      storageClass: ""
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
    extraEnvVars:
      - name: POSTGRESQL_MAX_CONNECTIONS
        value: "200"
  readReplicas:
    replicaCount: 2
    persistence:
      enabled: true
      size: 50Gi
  metrics:
    enabled: true

# -- Monitoring configuration
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    path: /api/metrics
    labels: {}
  prometheusRules:
    enabled: true
  grafanaDashboard:
    enabled: true

# -- Persistence
persistence:
  uploads:
    enabled: true
    existingClaim: ""
    size: 20Gi
    storageClass: ""
    accessMode: ReadWriteMany

# -- Extra labels to add to all resources
extraLabels: {}
  # team: platform
  # cost-center: gold-trading

# -- Extra annotations
extraAnnotations: {}

# -- Extra environment variables
extraEnv: []
  # - name: FOO
  #   value: bar

# -- Extra volume mounts
extraVolumeMounts: []
  # - name: extra-volume
  #   mountPath: /app/extra

# -- Extra volumes
extraVolumes: []
  # - name: extra-volume
  #   persistentVolumeClaim:
  #     claimName: extra-pvc

# -- Deployment strategy
deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 0

# -- Pod lifecycle hooks
lifecycle:
  preStop:
    exec:
      command: ["/bin/sh", "-c", "sleep 10"]

# -- Termination grace period
terminationGracePeriodSeconds: 60

# -- Revision history limit
revisionHistoryLimit: 10
