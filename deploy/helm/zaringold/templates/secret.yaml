{{- if .Values.secrets.enabled }}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zaringold.fullname" . }}-secrets
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "zaringold.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  {{- with .Values.secrets.databaseUrl }}
  DATABASE_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.redisPassword }}
  REDIS_PASSWORD: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.redisUrl }}
  REDIS_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.jwtSecret }}
  JWT_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.sessionSecret }}
  SESSION_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.otpEncryptionKey }}
  OTP_ENCRYPTION_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.zarinpalMerchantId }}
  ZARINPAL_MERCHANT_ID: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.smsApiKey }}
  SMS_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.smsSender }}
  SMS_SENDER: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.smtpHost }}
  SMTP_HOST: {{ . | quote }}
  {{- end }}
  SMTP_PORT: {{ .Values.secrets.smtpPort | quote }}
  {{- with .Values.secrets.smtpUser }}
  SMTP_USER: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.smtpPassword }}
  SMTP_PASSWORD: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.emailFrom }}
  EMAIL_FROM: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.telegramBotToken }}
  TELEGRAM_BOT_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.tgjuApiUrl }}
  TGJU_API_URL: {{ . | quote }}
  {{- end }}
{{- end }}
{{- end }}
