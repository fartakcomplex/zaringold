apiVersion: v1
kind: ConfigMap
metadata:
  name: zaringold-config
  namespace: zaringold
  labels:
    app.kubernetes.io/name: zaringold
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: zaringold
data:
  # Application
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  PORT: "3000"
  HOSTNAME: "0.0.0.0"

  # Database
  DATABASE_PROVIDER: "postgresql"

  # Redis
  REDIS_HOST: "zaringold-redis-master.zaringold.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_KEY_PREFIX: "zg:"

  # Chat Service
  CHAT_SERVICE_HOST: "chat-service.zaringold.svc.cluster.local"
  CHAT_SERVICE_PORT: "3005"

  # Price Service
  PRICE_SERVICE_HOST: "price-service.zaringold.svc.cluster.local"
  PRICE_UPDATE_INTERVAL: "30000"

  # Feature Flags
  ENABLE_CHAT: "true"
  ENABLE_REALTIME_PRICES: "true"
  ENABLE_GOLD_CARD: "true"
  ENABLE_MERCHANT_GATEWAY: "true"
  ENABLE_GAMIFICATION: "true"
  ENABLE_INSURANCE: "true"
  ENABLE_TELEGRAM_BOT: "true"
  ENABLE_AI_CHAT: "true"
  ENABLE_MULTILINGUAL: "true"

  # Rate Limiting
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  RATE_LIMIT_MAX_OTP: "5"

  # Session
  SESSION_TTL_HOURS: "72"
  SESSION_MAX_AGE_MS: "259200000"

  # Logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

  # CORS
  CORS_ALLOWED_ORIGINS: "https://zaringold.ir,https://www.zaringold.ir"
