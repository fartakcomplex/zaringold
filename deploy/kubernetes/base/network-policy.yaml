apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nextjs-app-policy
  namespace: zaringold
  labels:
    app.kubernetes.io/name: zaringold
    app.kubernetes.io/component: nextjs
    app.kubernetes.io/part-of: zaringold
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: zaringold
      app.kubernetes.io/component: nextjs
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
    # Allow health checks from all namespaces
    - from:
        - namespaceSelector: {}
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: prometheus
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: zaringold
              app.kubernetes.io/component: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: zaringold
              app.kubernetes.io/component: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Allow chat service
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: zaringold
              app.kubernetes.io/component: chat-service
      ports:
        - protocol: TCP
          port: 3005
    # Allow price service
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: zaringold
              app.kubernetes.io/component: price-service
      ports:
        - protocol: TCP
          port: 3006
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chat-service-policy
  namespace: zaringold
  labels:
    app.kubernetes.io/name: zaringold
    app.kubernetes.io/component: chat-service
    app.kubernetes.io/part-of: zaringold
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: zaringold
      app.kubernetes.io/component: chat-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from ingress (for Socket.IO WebSocket)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3005
    # Allow from nextjs app
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: zaringold
              app.kubernetes.io/component: nextjs
      ports:
        - protocol: TCP
          port: 3005
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: zaringold
              app.kubernetes.io/component: redis
      ports:
        - protocol: TCP
          port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: price-service-policy
  namespace: zaringold
  labels:
    app.kubernetes.io/name: zaringold
    app.kubernetes.io/component: price-service
    app.kubernetes.io/part-of: zaringold
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: zaringold
      app.kubernetes.io/component: price-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from nextjs app
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: zaringold
              app.kubernetes.io/component: nextjs
      ports:
        - protocol: TCP
          port: 3006
    # Allow Prometheus scraping
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: prometheus
      ports:
        - protocol: TCP
          port: 3006
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: zaringold
              app.kubernetes.io/component: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow external TGJU API
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
