apiVersion: v1
kind: Secret
metadata:
  name: zaringold-secrets
  namespace: zaringold
  labels:
    app.kubernetes.io/name: zaringold
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: zaringold
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgresql://zaringold:CHANGE_ME_IN_PRODUCTION@zaringold-postgres-primary.zaringold.svc.cluster.local:5432/zaringold?schema=public&connect_timeout=10&pool_size=20"

  # Redis
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  REDIS_URL: "redis://:CHANGE_ME_IN_PRODUCTION@zaringold-redis-master.zaringold.svc.cluster.local:6379/0"

  # Authentication
  JWT_SECRET: "CHANGE_ME_USE_64_CHAR_RANDOM_STRING"
  SESSION_SECRET: "CHANGE_ME_USE_64_CHAR_RANDOM_STRING"
  OTP_ENCRYPTION_KEY: "CHANGE_ME_USE_32_CHAR_KEY"

  # Payment Gateway
  ZARINPAL_MERCHANT_ID: "CHANGE_ME_ZARINPAL_MERCHANT"
  ZARINPAL_CALLBACK_URL: "https://zaringold.ir/api/payment/callback"

  # SMS Provider
  SMS_API_KEY: "CHANGE_ME_SMS_API_KEY"
  SMS_SENDER: "CHANGE_ME_SENDER_NUMBER"
  SMS_PROVIDER_URL: "https://api.kavenegar.com/v1"

  # Email
  SMTP_HOST: "smtp.zaringold.ir"
  SMTP_PORT: "587"
  SMTP_USER: "noreply@zaringold.ir"
  SMTP_PASSWORD: "CHANGE_ME_SMTP_PASSWORD"
  EMAIL_FROM: "ZarinGold <noreply@zaringold.ir>"

  # Telegram
  TELEGRAM_BOT_TOKEN: "CHANGE_ME_TELEGRAM_BOT_TOKEN"

  # AI (Chat)
  OPENAI_API_KEY: "CHANGE_ME_OPENAI_API_KEY"

  # External APIs
  TGJU_API_URL: "https://api.tgju.org/v1"
  GOLD_API_KEY: "CHANGE_ME_GOLD_API_KEY"
