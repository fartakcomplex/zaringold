apiVersion: apps/v1
kind: Deployment
metadata:
  name: price-service
  namespace: zaringold
  labels:
    app.kubernetes.io/name: zaringold
    app.kubernetes.io/component: price-service
    app.kubernetes.io/part-of: zaringold
    app.kubernetes.io/version: "v3.0.0"
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: zaringold
      app.kubernetes.io/component: price-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zaringold
        app.kubernetes.io/component: price-service
        app.kubernetes.io/part-of: zaringold
        app.kubernetes.io/version: "v3.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3006"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: zaringold-app
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: price-service
          image: ghcr.io/fartakcomplex/zaringold-price:v3.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3006
              protocol: TCP

          envFrom:
            - configMapRef:
                name: zaringold-config
            - secretRef:
                name: zaringold-secrets

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "0.5"
              memory: 256Mi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
