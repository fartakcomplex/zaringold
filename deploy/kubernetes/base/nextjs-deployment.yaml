apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs-app
  namespace: zaringold
  labels:
    app.kubernetes.io/name: zaringold
    app.kubernetes.io/component: nextjs
    app.kubernetes.io/part-of: zaringold
    app.kubernetes.io/version: "v3.0.0"
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 3
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: zaringold
      app.kubernetes.io/component: nextjs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zaringold
        app.kubernetes.io/component: nextjs
        app.kubernetes.io/part-of: zaringold
        app.kubernetes.io/version: "v3.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"
    spec:
      serviceAccountName: zaringold-app
      terminationGracePeriodSeconds: 60

      # Security Context (Pod-level)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      # Topology Spread for multi-zone distribution
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zaringold
              app.kubernetes.io/component: nextjs
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zaringold
              app.kubernetes.io/component: nextjs

      # Anti-affinity - spread across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/component
                      operator: In
                      values:
                        - nextjs
                topologyKey: kubernetes.io/hostname

      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z $DATABASE_HOST 5432; do echo 'Waiting for PostgreSQL...'; sleep 2; done"]
          env:
            - name: DATABASE_HOST
              value: "zaringold-postgres-primary.zaringold.svc.cluster.local"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z $REDIS_HOST 6379; do echo 'Waiting for Redis...'; sleep 2; done"]
          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: zaringold-config
                  key: REDIS_HOST
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      containers:
        - name: nextjs
          image: ghcr.io/fartakcomplex/zaringold:v3.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          # Environment from ConfigMap
          envFrom:
            - configMapRef:
                name: zaringold-config
            - secretRef:
                name: zaringold-secrets
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          # Resource Limits
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi

          # Security Context (Container-level)
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # Liveness Probe
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
              httpHeaders:
                - name: X-Health-Check
                  value: "liveness"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1

          # Readiness Probe
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
              httpHeaders:
                - name: X-Health-Check
                  value: "readiness"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # Startup Probe (slow starting containers)
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          # Volume Mounts
          volumeMounts:
            - name: uploads
              mountPath: /app/public/uploads
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.next/cache

          # Lifecycle
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]

      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: zaringold-uploads
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
        - name: cache
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
