apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: zaringold
  labels:
    app.kubernetes.io/name: zaringold
    app.kubernetes.io/component: chat-service
    app.kubernetes.io/part-of: zaringold
    app.kubernetes.io/version: "v3.0.0"
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: zaringold
      app.kubernetes.io/component: chat-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zaringold
        app.kubernetes.io/component: chat-service
        app.kubernetes.io/part-of: zaringold
        app.kubernetes.io/version: "v3.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3005"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: zaringold-app
      terminationGracePeriodSeconds: 60

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zaringold
              app.kubernetes.io/component: chat-service

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/component
                      operator: In
                      values:
                        - chat-service
                topologyKey: kubernetes.io/hostname

      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z $REDIS_HOST 6379; do echo 'Waiting for Redis...'; sleep 2; done"]
          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: zaringold-config
                  key: REDIS_HOST
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      containers:
        - name: chat-service
          image: ghcr.io/fartakcomplex/zaringold-chat:v3.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3005
              protocol: TCP

          envFrom:
            - configMapRef:
                name: zaringold-config
            - secretRef:
                name: zaringold-secrets
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/$(REDIS_DB)"
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: zaringold-config
                  key: CORS_ALLOWED_ORIGINS

          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 20

          volumeMounts:
            - name: tmp
              mountPath: /tmp

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]

      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
