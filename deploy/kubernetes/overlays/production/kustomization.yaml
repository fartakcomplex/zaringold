apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: zaringold

# Reference base manifests
resources:
  - ../../base

# Common labels for production
commonLabels:
  app.kubernetes.io/environment: production
  team: platform
  cost-center: gold-trading

# Production secret generator (reads from files)
secretGenerator:
  - name: zaringold-secrets
    envs:
      - .env.secrets
    options:
      disableNameSuffixHash: false

# ConfigMap patches for production
configMapGenerator:
  - name: zaringold-config
    behavior: merge
    literals:
      - LOG_LEVEL=warn
      - ENABLE_CHAT=true
      - ENABLE_REALTIME_PRICES=true
      - RATE_LIMIT_MAX_REQUESTS=60
      - CORS_ALLOWED_ORIGINS=https://zaringold.ir,https://www.zaringold.ir,https://app.zaringold.ir

# Patches
patches:
  # Increase Next.js replicas
  - target:
      kind: Deployment
      name: nextjs-app
    patch: |
      - op: replace
        path: /spec/replicas
        value: 5
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: ghcr.io/fartakcomplex/zaringold:v3.0.0

  # Increase chat service replicas
  - target:
      kind: Deployment
      name: chat-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3

  # Increase resource limits for production
  - target:
      kind: Deployment
      name: nextjs-app
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 1000m
            memory: 1Gi
          limits:
            cpu: "4"
            memory: 4Gi

  # Production HPA patches
  - path: hpa-patch.yaml

# Images
images:
  - name: ghcr.io/fartakcomplex/zaringold
    newTag: v3.0.0
  - name: ghcr.io/fartakcomplex/zaringold-chat
    newTag: v3.0.0
  - name: ghcr.io/fartakcomplex/zaringold-price
    newTag: v3.0.0
