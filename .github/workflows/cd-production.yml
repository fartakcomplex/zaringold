name: Zaringold CD - Production

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  pre-deploy-checks:
    name: Pre-Deploy Health Checks
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Check current production health
        run: |
          curl -sf https://zaringold.ir/api/health/live || echo "WARN: Production not reachable"
          curl -sf https://zaringold.ir/api/health/ready || echo "WARN: Production not ready"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, pre-deploy-checks]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Deploy with Helm
        run: |
          helm upgrade --install zaringold deploy/helm/zaringold \
            --namespace zaringold --create-namespace \
            --set image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set replicaCount=5 \
            --set autoscaling.minReplicas=5 \
            --set autoscaling.maxReplicas=100 \
            --wait --timeout 10m \
            --atomic \
            -f deploy/helm/zaringold/values.yaml
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_PRODUCTION }}

      - name: Verify deployment
        run: |
          echo "Waiting for pods to be ready..."
          kubectl wait --for=condition=Ready pods \
            --all -n zaringold --timeout=300s
          kubectl get pods -n zaringold
          kubectl get svc -n zaringold
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_PRODUCTION }}

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-production
    steps:
      - name: Run smoke tests
        run: |
          echo "=== Running Smoke Tests ==="
          
          # Test 1: Liveness
          echo "Test 1: Liveness probe..."
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://zaringold.ir/api/health/live)
          if [ "$STATUS" = "200" ]; then echo "✅ Liveness OK"; else echo "❌ Liveness FAILED ($STATUS)"; exit 1; fi
          
          # Test 2: Readiness
          echo "Test 2: Readiness probe..."
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://zaringold.ir/api/health/ready)
          if [ "$STATUS" = "200" ]; then echo "✅ Readiness OK"; else echo "❌ Readiness FAILED ($STATUS)"; exit 1; fi
          
          # Test 3: Homepage
          echo "Test 3: Homepage..."
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://zaringold.ir/)
          if [ "$STATUS" = "200" ]; then echo "✅ Homepage OK"; else echo "❌ Homepage FAILED ($STATUS)"; exit 1; fi
          
          # Test 4: Gold prices API
          echo "Test 4: Gold prices API..."
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://zaringold.ir/api/gold/prices)
          if [ "$STATUS" = "200" ]; then echo "✅ Gold prices OK"; else echo "⚠️ Gold prices returned $STATUS"; fi
          
          # Test 5: Metrics endpoint
          echo "Test 5: Metrics..."
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://zaringold.ir/api/metrics)
          if [ "$STATUS" = "200" ]; then echo "✅ Metrics OK"; else echo "⚠️ Metrics returned $STATUS"; fi
          
          echo "=== All critical tests passed ==="

  rollback-on-failure:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy-production, smoke-tests]
    if: failure()
    steps:
      - uses: azure/setup-helm@v4

      - name: Rollback deployment
        run: |
          echo "🚨 Smoke tests failed! Rolling back..."
          helm rollback zaringold 0 -n zaringold --wait --timeout 5m
          echo "✅ Rollback complete"
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_PRODUCTION }}

      - name: Notify team
        run: |
          echo "Deployment rolled back. Please investigate and fix."
          # Add Slack/Discord/Telegram notification here
