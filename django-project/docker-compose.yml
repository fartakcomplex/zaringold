version: '3.8'

services:
  # ─── PostgreSQL ────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: zarringold_db
    environment:
      POSTGRES_DB: zarringold
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: zarringold_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Django API ──────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: zarringold_api
    command: gunicorn zarringold.core.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 120
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery Worker ───────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: zarringold_celery
    command: celery -A zarringold.core.celery worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - db

  # ─── Celery Beat ─────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: zarringold_beat
    command: celery -A zarringold.core.celery beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - db

  # ─── Nginx ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: zarringold_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      - api

volumes:
  postgres_data:
  media_data:
  static_data:
