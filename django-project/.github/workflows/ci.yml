name: Zarrin Gold CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: zarringold_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -r requirements/dev.txt
      - name: Lint
        run: flake8 zarringold --max-line-length=120 && black --check zarringold
      - name: Test
        env:
          DB_NAME: zarringold_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          SECRET_KEY: test-key
          DEBUG: "True"
        run: python manage.py test --coverage

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker build -t zarringold:${{ github.sha }} -f docker/Dockerfile .
